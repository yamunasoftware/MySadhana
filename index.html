<!DOCTYPE html>

<html lang="en">
<meta charset="utf-8" />
<meta name="description" content="Personal Productivity App" />
<meta name="viewport" content="initial-scale=1, width=device-width, height=device-height, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<!-- Tab -->
<head>
  <title> MySadhana </title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/src/Images/medium_icon.png" />
  <link rel="apple-touch-startup-image" href="/src/Images/medium_icon.png" />
  <link rel="shortcut icon" type="image/png" href="/src/Images/small_icon.png" />
</head>

<!-- Stylesheets -->
<link rel="stylesheet" href="/src/CSS/fonts.css" />
<link rel="stylesheet" href="/src/CSS/style.css" />

<!-- Cloud Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- Scripts -->
<script src="/src/JS/ui.js"></script>
<script src="/src/JS/cloud.js"></script>

<!-- Container -->
<div id="container">

  <body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="screen gradient deactivate center">
      <!-- Header -->
      <div class="header padding">
        <!-- Header -->
        <div class="padding"> MySadhana </div>

        <!-- Motto -->
        <div> Productivity. </div>
        <div> Simplified. </div>
      </div>

      <!-- Sign Up -->
      <div id="sign-in" class="padding">
        <!-- Sign Up Buttons -->
        <button onclick="signUp();"> Sign Up </button>
        <button onclick="showLogIn();"> Log In </button>
      </div>

      <!-- Log In -->
      <div id="log-in" class="padding deactivate">
        <!-- Log In Elements -->
        <input id="log-in-input" />
        <button onclick="logIn();"> Submit </button>

        <!-- Error Message -->
        <div id="error" class="padding" style="display: inline;"></div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="screen center deactivate center fit-content">
      <!-- Header -->
      <div class="padding header">
         <!-- Image Logo --> 
         <image  src="/src/Images/medium_icon_masked.png"></image>
      </div>

      <!-- Search Elements -->
      <div class="search">
        <!-- Search Controls -->
        <input id="search" />
      </div>

      <!-- Add Elements -->
      <div class="padding">
        <!-- Login Code -->
        <div id="login-code" class="padding"></div>

        <!-- Add Controls --> 
        <button onclick="addNote();"> New </button>
        <button onclick="window.location.reload();"> Update </button>
        <button onclick="clearCacheData(); window.location.reload();"> Sign Out </button>
      </div>

      <!-- Notes Padding -->
      <div class="padding-extra-top">
        <!-- Notes List -->
        <div class="subheader"> Notes </div>
        <div id="notes-list" class="padding"></div>
      </div>

      <!-- Footer -->
      <div class="padding">
        &copy; 2022 YSS &nbsp; 
        <a style="color: #ffffff;" class="no-decoration" href="https://github.com/yamunasoftware/MySadhana"> GitHub </a>
      </div>
    </div>

    <!-- Notes -->
    <div id="notes" class="screen deactivate">
      <!-- Header and Text Area -->
      <div id="notes-header" class="padding header"></div>
      <textarea id="text-area" class="padding"></textarea>
    </div>

  </body>
</div>

</html>
