<!DOCTYPE html>

<html lang="en">
<meta charset="utf-8" />
<meta name="description" content="Personal Productivity App" />
<meta name="viewport" content="initial-scale=1, width=device-width, height=device-height, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<!-- Tab -->
<head>
  <title> MySadhana </title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/src/Images/medium_icon.png" />
  <link rel="apple-touch-startup-image" href="/src/Images/medium_icon.png" />
  <link rel="shortcut icon" type="image/png" href="/src/Images/small_icon.png" />
</head>

<!-- Stylesheets -->
<link rel="stylesheet" href="/src/CSS/fonts.css" />
<link rel="stylesheet" href="/src/CSS/style.css" />

<!-- Cloud Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- Scripts -->
<script src="/src/JS/ui.js"></script>
<script src="/src/JS/cloud.js"></script>

<!-- Container -->
<div id="container">

  <body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="screen gradient deactivate center">
      <!-- Header -->
      <div class="header padding">
        <!-- Header -->
        <div class="padding"> MySadhana </div>

        <!-- Motto -->
        <div> Productivity. </div>
        <div> Simplified. </div>
      </div>

      <!-- Sign Up -->
      <div id="sign-in" class="padding">
        <!-- Sign Up Buttons -->
        <button onclick="signUp();"> Sign Up </button>
        <button onclick="showLogIn();"> Log In </button>
      </div>

      <!-- Log In -->
      <div id="log-in" class="padding deactivate">
        <!-- Log In Elements -->
        <input id="log-in-input" />
        <button onclick="logIn();"> Submit </button>

        <!-- Error Message -->
        <div id="error" class="padding" style="display: inline;"></div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="screen deactivate">
      <!-- Navigation -->
      <div id="navigation" class="navigation center deactivate in" onclick="closeNavigation();">
        <!-- Logo -->
        <image style="padding-bottom: 20px;" src="src/Images/page_icon.png"></image>

        <!-- Add Controls -->
        <div class="nav-button center" onclick="addNote();"> New </div>
        <div class="nav-button center" onclick="copyCode();"> Copy </div>
        <div class="nav-button center" onclick="clearCacheData(); window.location.reload();"> Exit </div>
      </div>

      <!-- Main Content -->
      <div class="padding no-padding-left">
        <!-- Open Nav Button -->
        <div class="open-navigation padding" onclick="showNavigation();">
          <!-- Menu Icon -->
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>

        <!-- Search Controls -->
        <div class="padding padding-double-top subheader"> Search </div>
        <input id="search" class="margin" style="margin-left: 40px;" />

        <!-- Notes Padding -->
        <div class="padding-extra-top">
          <!-- Notes List -->
          <div class="padding subheader no-padding-bottom"> Notes </div>
          <div id="notes-list" class="padding"></div>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div id="notes" class="screen deactivate">
      <!-- Notes Bar -->
      <div id="notes-bar" class="padding"></div>
      <div id="past-dates" style="color: #FF0F0F;" class="disappear inline fit-content padding"></div>
      <div id="current-dates" style="color: #147efb;" class="disappear inline fit-content padding"></div>
      <div id="future-dates" style="color: #53d769;" class="disappear inline fit-content padding"></div>

      <!-- Text Area -->
      <div id="text-area" class="padding text-area" contenteditable></div>
    </div>

  </body>
</div>

</html>
